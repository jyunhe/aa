<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            /* Dark pastel blue background */
            --bg-color: #3b5266; 
            /* Slightly darker blue for the cards/containers */
            --card-bg: #2a3c4d;  
            /* Crisp white text */
            --text-main: #ffffff; 
            /* Soft light blue-gray for secondary text */
            --text-muted: #cbd5e1; 
            /* Unique vibrant teal for primary buttons and accents */
            --accent: #38ada9; 
            /* Subtle borders */
            --border: #576574; 
            /* Keep red for dangerous actions */
            --danger: #ef4444; 
        }
        body {
            font-family: 'Calibri', Tahoma, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }
        /* Consistent Menu Bar */
        nav {
            background-color: var(--card-bg);
            padding: 1rem 2rem;
            border-bottom: 2px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav h1 { margin: 0; font-size: 1.5rem; color: var(--accent); }
        nav a {
            color: var(--text-main);
            text-decoration: none;
            margin-left: 1.5rem;
            font-weight: bold;
            transition: color 0.3s;
        }
        nav a:hover, nav a.active { color: var(--accent); }
        
        .container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
        .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 2rem; }
        .card {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        h2 { margin-top: 0; font-size: 1.25rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;}
        
        /* Form Styles */
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem;}
        input {
            width: 100%; padding: 0.75rem; box-sizing: border-box;
            background-color: var(--bg-color); border: 1px solid var(--border);
            color: var(--text-main); border-radius: 4px;
        }
        button {
            width: 100%; padding: 0.75rem; background-color: var(--accent);
            color: #ffffff; border: none; border-radius: 4px; font-weight: bold;
            cursor: pointer; transition: opacity 0.3s;
        }
        button:hover { opacity: 0.8; }
        .btn-danger { background-color: var(--danger); color: white; margin-top: 1rem; }
        
        /* Table Styles */
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--accent); }
        .error { color: var(--danger); font-size: 0.85rem; margin-top: 0.5rem; display: none; }
    </style>
</head>
<body>

    <nav>
        <h1>ABC Logistics</h1>
        <div>
            <a href="index.html" class="active">Dashboard</a>
            <a href="about.html">Developer Profile</a>
        </div>
    </nav>

    <div class="container">
        <div class="grid">
            <div class="card">
                <h2>Add Inventory Item</h2>
                <div class="form-group">
                    <label>Item Name</label>
                    <input type="text" id="itemName" placeholder="e.g. Wireless Mouse">
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="itemQty" min="0" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Price ($)</label>
                    <input type="number" id="itemPrice" min="0" step="0.01" placeholder="0.00">
                </div>
                <div id="errorMsg" class="error"></div>
                <button onclick="addItem()">Add to Inventory</button>
                <button class="btn-danger" onclick="clearAll()">Clear All Items</button>
            </div>

            <div class="card">
                <h2>Inventory Visualization</h2>
                <canvas id="inventoryChart"></canvas>
            </div>
        </div>

        <div class="card" style="margin-top: 2rem;">
            <h2>Current Inventory (Option A: The Accountant)</h2>
            <table>
                <thead>
                    <tr>
                        <th>Item Name</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th>Total Value</th>
                    </tr>
                </thead>
                <tbody id="inventoryTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        let inventory = JSON.parse(localStorage.getItem('abc_inventory')) || [];
        let chartInstance = null;

        function updateUI() {
            const tbody = document.getElementById('inventoryTableBody');
            tbody.innerHTML = '';
            
            let labels = [];
            let quantities = [];

            inventory.forEach(item => {
                const totalValue = (item.qty * item.price).toFixed(2);
                
                // Populate Table
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.name}</td>
                    <td>${item.qty}</td>
                    <td>$${item.price.toFixed(2)}</td>
                    <td>$${totalValue}</td>
                `;
                tbody.appendChild(tr);

                // Populate Chart Data
                labels.push(item.name);
                quantities.push(item.qty);
            });

            renderChart(labels, quantities);
        }

        function addItem() {
            const name = document.getElementById('itemName').value.trim();
            const qty = parseFloat(document.getElementById('itemQty').value);
            const price = parseFloat(document.getElementById('itemPrice').value);
            const errorMsg = document.getElementById('errorMsg');

            // Phase 5: Correctness Validations
            if (!name || isNaN(qty) || isNaN(price)) {
                showError("All fields are required and must be valid numbers.");
                return;
            }
            if (qty < 0 || price < 0) {
                showError("Quantity and Price cannot be negative.");
                return;
            }
            if (inventory.some(item => item.name.toLowerCase() === name.toLowerCase())) {
                showError("This item already exists in the inventory.");
                return;
            }

            errorMsg.style.display = 'none';

            // Save to database (localStorage)
            inventory.push({ name, qty, price });
            localStorage.setItem('abc_inventory', JSON.stringify(inventory));
            
            // Clear inputs
            document.getElementById('itemName').value = '';
            document.getElementById('itemQty').value = '';
            document.getElementById('itemPrice').value = '';

            updateUI();
        }

        function clearAll() {
            if(confirm("Are you sure you want to delete all inventory data?")) {
                inventory = [];
                localStorage.removeItem('abc_inventory');
                updateUI();
            }
        }

        function showError(msg) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }

        function renderChart(labels, data) {
            const ctx = document.getElementById('inventoryChart').getContext('2d');
            
            if (chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Quantity in Stock',
                        data: data,
                        backgroundColor: '#38ada9', // Matches the new teal accent
                        borderColor: '#079992',     // Slightly darker teal border
                        borderWidth: 1
                    }]
                },
                options: {
                    scales: {
                        y: { beginAtZero: true, ticks: { color: '#cbd5e1' } }, // Muted light blue text
                        x: { ticks: { color: '#cbd5e1' } }
                    },
                    plugins: {
                        legend: { labels: { color: '#ffffff' } } // Crisp white text
                    }
                }
            });
        }

        // Initial Load
        updateUI();
    </script>
</body>
</html>
